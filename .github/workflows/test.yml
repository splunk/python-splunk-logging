name: Test

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install UV
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run Linters
        run: uv run --locked tox -e lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.9"
          - "3.14"
    steps:
      - uses: actions/checkout@v7

      - name: Install UV
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run Tests
        run: uv run --locked tox -e test
